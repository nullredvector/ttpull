<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ttpull</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 300px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      background: #111;
      color: #e0e0e0;
    }
    header {
      padding: 14px 16px 10px;
      border-bottom: 1px solid #222;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    header h1 { font-size: 15px; font-weight: 600; letter-spacing: 0.5px; }
    header .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #444;
      transition: background 0.3s;
    }
    header .dot.online  { background: #4caf50; }
    header .dot.offline { background: #f44336; }

    section { padding: 12px 16px; border-bottom: 1px solid #1a1a1a; }

    label { display: block; font-size: 11px; color: #777; margin-bottom: 5px; }

    input[type="text"], input[type="number"] {
      width: 100%;
      background: #1e1e1e;
      border: 1px solid #2a2a2a;
      border-radius: 6px;
      color: #e0e0e0;
      padding: 7px 10px;
      font-size: 13px;
      outline: none;
    }
    input:focus { border-color: #555; }

    .row { display: flex; gap: 8px; align-items: center; }
    .row input[type="number"] { width: 70px; }
    .row span { color: #666; font-size: 12px; }

    .toggle {
      position: relative; width: 36px; height: 20px; flex-shrink: 0;
    }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute; cursor: pointer;
      inset: 0; background: #333; border-radius: 20px;
      transition: background 0.2s;
    }
    .slider::before {
      content: ''; position: absolute;
      width: 14px; height: 14px; left: 3px; top: 3px;
      background: #888; border-radius: 50%;
      transition: transform 0.2s, background 0.2s;
    }
    input:checked + .slider { background: #1976d2; }
    input:checked + .slider::before { transform: translateX(16px); background: #fff; }

    .status-block {
      background: #151515;
      border-radius: 6px;
      padding: 8px 10px;
      font-size: 11px;
      color: #888;
      line-height: 1.5;
      min-height: 36px;
    }
    .status-block.ok  { color: #81c784; }
    .status-block.err { color: #e57373; }

    .btn {
      display: block; width: 100%;
      padding: 9px;
      background: #1976d2;
      color: #fff;
      border: none; border-radius: 7px;
      font-size: 13px; font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn:hover { background: #1565c0; }
    .btn:disabled { background: #1e1e1e; color: #555; cursor: default; }

    footer {
      padding: 10px 16px;
      display: flex;
      gap: 8px;
    }
    footer .btn-secondary {
      flex: 1;
      padding: 8px;
      background: #1e1e1e;
      color: #aaa;
      border: 1px solid #2a2a2a;
      border-radius: 7px;
      font-size: 12px;
      cursor: pointer;
      text-align: center;
    }
    footer .btn-secondary:hover { background: #252525; }

    #last-push { font-size: 10px; color: #555; margin-top: 4px; }
  </style>
</head>
<body>
  <header>
    <div class="dot" id="dot"></div>
    <h1>ttpull</h1>
  </header>

  <section>
    <label>Container URL</label>
    <input type="text" id="server-url" placeholder="http://localhost:3847" />
  </section>

  <section>
    <div class="row">
      <label style="margin:0;flex:1">Auto-sync every</label>
      <input type="number" id="interval" min="1" max="168" value="24" />
      <span>hours</span>
      <label class="toggle">
        <input type="checkbox" id="enabled" />
        <span class="slider"></span>
      </label>
    </div>
  </section>

  <section>
    <label>Status</label>
    <div class="status-block" id="status">—</div>
    <div id="last-push"></div>
  </section>

  <section>
    <button class="btn" id="push-btn">Push Session Now</button>
  </section>

  <footer>
    <div class="btn-secondary" id="job-status-btn">Job Status</div>
    <div class="btn-secondary" id="run-now-btn">Run Now</div>
  </footer>

  <script src="popup.js"></script>
</body>
</html>
