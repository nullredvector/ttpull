services:
  ttpull:
    image: ghcr.io/nullredvector/ttpull:latest
    # build: ./container  # uncomment for local dev
    ports:
      - "3847:3847"
    volumes:
      - ${ARCHIVE_DIR:-./archive}:/app/archive
    environment:
      - ARCHIVE_DIR=/app/archive
      - CRON_SCHEDULE=${CRON_SCHEDULE:-0 3 * * *}
    restart: unless-stopped
